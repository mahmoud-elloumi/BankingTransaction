<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransactFlow — Connexion</title>
    <meta name="description" content="Connexion au système de transactions bancaires en temps réel">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-card: rgba(15, 23, 42, 0.92);
            --border: rgba(0, 180, 216, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --accent-blue: #00b4d8;
            --accent-purple: #0077b6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ─── Animated Background ─── */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(0, 180, 216, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(0, 119, 182, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(2, 62, 138, 0.04) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -1%) rotate(1deg); }
            66% { transform: translate(-1%, 2%) rotate(-1deg); }
        }

        /* ─── Login Container ─── */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.04);
            animation: cardIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ─── Logo ─── */
        .login-logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: none;
            border-radius: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            color: white;
            box-shadow: none;
            margin-bottom: 20px;
        }

        .logo-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(0, 180, 216, 0.25));
        }

        .login-logo h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #00b4d8 0%, #0077b6 50%, #90e0ef 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            font-family: 'Outfit', sans-serif;
            letter-spacing: -0.5px;
        }

        .login-logo p {
            font-size: 12px;
            color: #cbd5e1;
            font-weight: 400;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ─── Form ─── */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            background: rgba(0, 0, 0, 0.02);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.25s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
            background: rgba(0, 180, 216, 0.08);
            color: var(--text-primary);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        /* ─── Toggle Password ─── */
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-muted);
            padding: 4px;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: var(--text-secondary);
        }

        /* ─── Error Message ─── */
        .error-msg {
            display: none;
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: var(--radius-sm);
            color: var(--accent-red);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            animation: shakeIn 0.4s ease;
        }

        @keyframes shakeIn {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .error-msg.visible {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ─── Button ─── */
        .btn-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px 24px;
            background: linear-gradient(135deg, #00b4d8 0%, #0077b6 100%);
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0, 180, 216, 0.35);
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 180, 216, 0.45);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        /* ─── Spinner ─── */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-login.loading .spinner {
            display: block;
        }

        .btn-login.loading .btn-text {
            display: none;
        }

        /* ─── Footer ─── */
        .login-footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .login-footer p {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .login-footer .secured {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            color: var(--accent-green);
        }

        /* ─── Floating Decorations ─── */
        .decoration {
            position: fixed;
            z-index: 0;
            border-radius: 50%;
            opacity: 0.5;
        }

        .decoration.d1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.06), transparent 70%);
            top: -80px;
            right: -80px;
            animation: float 8s ease-in-out infinite;
        }

        .decoration.d2 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.06), transparent 70%);
            bottom: -40px;
            left: -40px;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(15px, -15px); }
        }

        /* ─── Responsive ─── */
        @media (max-width: 480px) {
            .login-card {
                padding: 36px 28px;
            }
        }
    </style>
</head>

<body>
    <div class="decoration d1"></div>
    <div class="decoration d2"></div>

    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#00b4d8"/>
                                <stop offset="50%" style="stop-color:#0077b6"/>
                                <stop offset="100%" style="stop-color:#023e8a"/>
                            </linearGradient>
                            <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:#90e0ef"/>
                                <stop offset="100%" style="stop-color:#00b4d8"/>
                            </linearGradient>
                            <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#0096c7"/>
                                <stop offset="100%" style="stop-color:#48cae4"/>
                            </linearGradient>
                        </defs>
                        <circle cx="100" cy="100" r="85" fill="none" stroke="#00b4d8" stroke-width="1" opacity="0.3"/>
                        <path d="M100 18 L170 55 L170 110 C170 145 140 175 100 190 C60 175 30 145 30 110 L30 55 Z"
                              fill="none" stroke="url(#grad1)" stroke-width="2.5" stroke-linejoin="round"/>
                        <path d="M100 28 L162 60 L162 108 C162 139 135 166 100 180 C65 166 38 139 38 108 L38 60 Z"
                              fill="url(#grad1)" opacity="0.08"/>
                        <g transform="translate(100,105)">
                            <path d="M-5 -38 C25 -38, 38 -20, 38 0 C38 18, 25 34, 5 38"
                                  fill="none" stroke="url(#grad2)" stroke-width="3.5" stroke-linecap="round"/>
                            <polygon points="8,32 2,42 12,40" fill="#90e0ef"/>
                            <path d="M5 38 C-25 38, -38 20, -38 0 C-38 -18, -25 -34, -5 -38"
                                  fill="none" stroke="url(#grad3)" stroke-width="3.5" stroke-linecap="round"/>
                            <polygon points="-8,-32 -2,-42 -12,-40" fill="#48cae4"/>
                            <circle cx="0" cy="0" r="6" fill="#00b4d8"/>
                        </g>
                        <circle cx="100" cy="22" r="2.5" fill="#48cae4" opacity="0.7"/>
                        <circle cx="165" cy="58" r="2" fill="#00b4d8" opacity="0.5"/>
                        <circle cx="35" cy="58" r="2" fill="#0096c7" opacity="0.5"/>
                    </svg>
                </div>
                <h1>TransactFlow</h1>
                <p>Transactions Bancaires en Temps Réel</p>
            </div>

            <!-- Error Message -->
            <div class="error-msg" id="errorMsg">
                <span>⚠️</span>
                <span id="errorText">Identifiants incorrects</span>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Nom d'utilisateur</label>
                    <div class="input-wrapper">
                        <span class="icon">👤</span>
                        <input type="text" id="username" name="username" placeholder="Entrez votre identifiant" autocomplete="username" required autofocus>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div class="input-wrapper">
                        <span class="icon">🔒</span>
                        <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe" autocomplete="current-password" required>
                        <button type="button" class="toggle-password" id="togglePassword" title="Afficher le mot de passe">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn-login" id="btnLogin">
                    <span class="btn-text">Se connecter</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p>
                    <span class="secured">🔐 Connexion sécurisée</span><br>
                    Powered by Apache Kafka &bull; Java 17
                </p>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', () => {
            const input = document.getElementById('password');
            const btn = document.getElementById('togglePassword');
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        });

        // Login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');

            btn.classList.add('loading');
            errorMsg.classList.remove('visible');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    // Store session token
                    sessionStorage.setItem('authToken', data.token);
                    sessionStorage.setItem('username', data.username);
                    // Redirect to dashboard
                    window.location.href = '/dashboard';
                } else {
                    errorText.textContent = data.error || 'Identifiants incorrects';
                    errorMsg.classList.add('visible');
                    // Shake the password field
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (err) {
                errorText.textContent = 'Erreur de connexion au serveur';
                errorMsg.classList.add('visible');
            }

            btn.classList.remove('loading');
        });
    </script>
</body>
</html>
